<div class="home-container">

    <!--LEFT SIDE -->
    <div class="appNavigation">
        <!--Write the logic-->
    </div>

    <!--CENTRE -->
    <div class="searchColumn">
        <!--Search component-->
        <app-search (citySearch)="searchedCity($event)"></app-search>
    </div>


    <div class="main-column">
        <!--Loading spinner-->
        @if (loading) {
            <p>Loading...</p>
        }

        <div class="aboutToday">
            <!--Current Weather-->
            @if (currentWeather) {
                <div class="current">
                    <app-current-weather [weather]="currentWeather"></app-current-weather>
                </div>
                
            }

            <!--Hourly Forecast-->
            @if (hourlyForecast) {
                <div class="hourly">
                    <app-hourly-forecast [hourlyForecast]="hourlyForecast"></app-hourly-forecast>
                </div>
                
            }

            <!--Error message-->
            @if (errorMessage) {
                <p>{{ errorMessage }}</p>
            }
        </div>
    </div>

    <!--RIGHT SIDE-->
    <div class="right-side-bar">
        <!--Weekly forecast-->
        @if (forecast) {
            <div class="weekly">
                <app-forecast [forecast]="forecast"></app-forecast>
            </div>
            
        }
    </div>
   
</div>
