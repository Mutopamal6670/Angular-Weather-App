<!--<h2>Enter city name to search</h2>-->

<form (ngSubmit)="search()" [formGroup]="userForm">
    <div class="input-container">
        <input type="text" formControlName="city_name"  placeholder="Enter city name ...">
    </div>
    <button id="submitBtn" type="submit" [disabled]="userForm.invalid">Search</button>
</form>
