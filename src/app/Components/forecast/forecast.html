@if(forecast){
    <div class="forecast-Container">
        <div class="heading">
            <h2>SIX-DAY FORECAST</h2>
            <h3>Daily Weather in brief</h3>
        </div>
        <hr class="divider">
        
        @for (item of forecast.days; track item.date) {
            <div class="day">
                <p class="day-item" id="date">{{item.date | date: 'EEE'}}</p>
                <div class="day-item" id="img-container">
                    <img src="{{item.icon}}" alt="weather icon" id="image">
                </div>
                <p class="day-item" id="description">{{item.description}}</p>
                <p class="day-item" id="temp">{{item.temperature}}°C</p>  
            </div> 
            <hr class="divider"> 
        }
    </div>  
}
