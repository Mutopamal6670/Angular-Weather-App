

@if(hourlyForecast) {
    <div class="hourly-container">
        @for (item of hourlyForecast; track item.time) {
            <div class="item">
                 <p>{{item.time}}</p>
                 <div class="cont-img">
                    <img src="{{item.icon}}" alt="weather icon">
                 </div>
            
                <p id="temp">{{item.temperature}}°C</p>
            </div>
            <hr class="hr-line">
        }
    </div> 
}
