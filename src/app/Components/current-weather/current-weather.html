
<div>
    @if (weather) {
        <p>City: {{weather.city}}</p>
        <p>Temperature: {{weather.temperature}}</p>
        <p>Humiditiy: {{weather.humidity}}</p>
        <p>Windspeed: {{weather.windSpeed}}</p>
        <p>Description: {{weather.description}}</p>
        <img src="{{weather.icon}}" alt="weather icon">
    }
    
</div>
